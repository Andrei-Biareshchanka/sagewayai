name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Generate Prisma client (server)
        run: cd server && npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sagewayai

      - name: Server type-check
        run: cd server && npx tsc --noEmit

      - name: Install web dependencies
        run: cd web && npm ci

      - name: Generate Prisma client (web)
        run: cd web && npx prisma generate

      - name: Web type-check
        run: cd web && npm run type-check

  server-unit:
    name: Server unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sagewayai
      - run: npm test
        env:
          JWT_SECRET: test-jwt-secret-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sagewayai
          RESEND_API_KEY: re_test_fake_key_for_ci
