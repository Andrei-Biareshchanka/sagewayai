name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  server-unit:
    name: Server unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm test
        env:
          JWT_SECRET: test-jwt-secret-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sagewayai

  client-unit:
    name: Client unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm test

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: [server-unit, client-unit]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sagewayai
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Run database migrations
        run: cd server && npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sagewayai

      - name: Seed database
        run: cd server && npx prisma db seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sagewayai

      - name: Start API server
        run: cd server && npm run dev &
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sagewayai
          JWT_SECRET: test-jwt-secret-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci
          PORT: 3001
          CLIENT_URL: http://localhost:5173

      - name: Wait for API server
        run: npx wait-on http://localhost:3001/api/health --timeout 30000

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Install Playwright browsers
        run: cd client && npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: cd client && npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 7
