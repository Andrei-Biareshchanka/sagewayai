name: Send daily parable

on:
  schedule:
    - cron: '0 8 * * *'  # 08:00 UTC every day
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  send:
    name: Send daily parable email
    runs-on: ubuntu-latest
    steps:
      - name: Wake up server and database
        run: |
          for i in $(seq 1 15); do
            echo "Attempt $i / 15..."
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "${{ secrets.API_URL }}/api/health" 2>/dev/null)
            [ -z "$status" ] && status="000"
            echo "HTTP status: $status"
            if [ "$status" = "200" ]; then
              echo "Server and database ready"
              exit 0
            elif [ "$status" = "503" ]; then
              echo "Server up, DB not ready yet..."
            else
              echo "No response (status: $status) - server still waking up"
            fi
            sleep 10
          done
          echo "Server or database did not become ready in time"
          exit 1

      - name: Trigger send-daily endpoint
        run: |
          curl -f --max-time 120 -X POST "${{ secrets.API_URL }}/api/admin/send-daily" \
            -H "x-send-secret: ${{ secrets.ADMIN_SEND_SECRET }}" \
            -H "Content-Type: application/json"
