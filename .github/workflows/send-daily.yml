name: Send daily parable

on:
  # Schedule disabled 2026-07-08 — legacy v1 email flow links to routes
  # (/parables/:id, /subscription/manage) that no longer exist on the current site.
  # workflow_dispatch kept for manual runs if this is ever revived.
  workflow_dispatch:

jobs:
  send:
    name: Send daily parable email
    runs-on: ubuntu-latest
    steps:
      - name: Wake up server
        run: |
          for i in $(seq 1 20); do
            echo "Attempt $i / 20..."
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${{ secrets.API_URL }}/api/health" 2>/dev/null) || status="000"
            echo "HTTP status: $status"
            if [ "$status" = "200" ]; then
              echo "Server is up"
              exit 0
            fi
            echo "Server not ready, waiting 10s..."
            sleep 10
          done
          echo "Server did not wake up in time"
          exit 1

      - name: Wait for database
        run: |
          for i in $(seq 1 10); do
            echo "DB check $i / 10..."
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "${{ secrets.API_URL }}/api/health/db" 2>/dev/null) || status="000"
            echo "HTTP status: $status"
            if [ "$status" = "200" ]; then
              echo "Database ready"
              exit 0
            fi
            echo "DB not ready, waiting 15s..."
            sleep 15
          done
          echo "Database did not become ready in time"
          exit 1

      - name: Trigger send-daily endpoint
        run: |
          curl -f --max-time 120 -X POST "${{ secrets.API_URL }}/api/admin/send-daily" \
            -H "x-send-secret: ${{ secrets.ADMIN_SEND_SECRET }}" \
            -H "Content-Type: application/json"
